<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | CareerPath AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
     NAVBAR
========================== -->

<nav class="navbar navbar-expand-lg navbar-light">

<div class="container">

<a class="navbar-brand" href="index.html">

CareerPath AI

</a>

</div>

</nav>

<!-- ==========================
     REGISTER SECTION
========================== -->

<section class="hero">

<div class="container">

<div class="row justify-content-center align-items-center">

<div class="col-lg-6 col-md-8">

<div class="hero-box">

<h2 class="text-center mb-3">

Create Account

</h2>

<p class="text-center text-muted mb-4">

Start your personalized career journey

</p>

<form id="registerForm">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter your full name"
required>

</div>

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Create a password"
required>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-premium">

Create Account

</button>

</div>

</form>

<div id="registerMessage" class="mt-3"></div>

<div class="text-center mt-4">

<p>

Already have an account?

<a
href="login.html"
style="color:#5A4634;font-weight:600;">

Login

</a>

</p>

</div>

<hr>

<div class="text-center">

<a
href="index.html"
style="color:#5A4634;font-weight:600;">

← Back to Home

</a>

</div>

</div>

</div>

</div>

</div>

</section>

<!-- ==========================
     FOOTER
========================== -->

<footer>

<div class="container text-center">

<h4>

CareerPath AI

</h4>

<p>

Helping Students Build Better Careers

</p>

<p>

© 2026 CareerPath AI. All Rights Reserved.

</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById("registerForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const name =
    document.getElementById("name").value.trim();

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    const message =
    document.getElementById("registerMessage");

    message.innerHTML =

    '<div class="alert alert-info">Creating account...</div>';

    try{

        const response = await fetch(

            "http://127.0.0.1:5000/register",

            {

                method:"POST",

                headers:{

                    "Content-Type":"application/json"

                },

                body:JSON.stringify({

                    name:name,

                    email:email,

                    password:password

                })

            }

        );

        const data = await response.json();

        if(data.success){

            message.innerHTML =

            '<div class="alert alert-success">Registration Successful! Redirecting to Login...</div>';

            setTimeout(function(){

                window.location.href="login.html";

            },1500);

        }

        else{

            message.innerHTML =

            `<div class="alert alert-danger">

                ${data.message}

            </div>`;

        }

    }

    catch(error){

        console.error(error);

        message.innerHTML =

        `<div class="alert alert-danger">

            Unable to connect to the backend.

            <br><br>

            Please make sure

            <strong>

            Flask Server

            </strong>

            is running on

            <br>

            http://127.0.0.1:5000

        </div>`;

    }

});

</script>

</body>

</html>
