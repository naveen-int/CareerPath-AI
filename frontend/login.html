
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | CareerPath AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
     NAVBAR
========================== -->

<nav class="navbar navbar-expand-lg navbar-light">

<div class="container">

<a class="navbar-brand" href="index.html">
CareerPath AI
</a>

</div>

</nav>

<!-- ==========================
     LOGIN SECTION
========================== -->

<section class="hero">

<div class="container">

<div class="row justify-content-center align-items-center">

<div class="col-lg-5 col-md-8">

<div class="hero-box">

<h2 class="text-center mb-3">
Welcome Back
</h2>

<p class="text-center text-muted mb-4">
Login to continue your career journey
</p>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="mb-4">

<label class="form-label">
Password
</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter your password"
required>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-premium">

Login

</button>

</div>

</form>

<div id="loginMessage" class="mt-3"></div>

<div class="text-center mt-4">

<p>

Don't have an account?

<a href="register.html"
style="color:#5A4634;font-weight:600;">

Register

</a>

</p>

</div>

<hr>

<div class="text-center">

<a href="index.html"
style="color:#5A4634;font-weight:600;">

← Back to Home

</a>

</div>

</div>

</div>

</div>

</div>

</section>

<!-- ==========================
     FOOTER
========================== -->

<footer>

<div class="container text-center">

<h4>CareerPath AI</h4>

<p>
Helping Students Build Better Careers
</p>

<p>
© 2026 CareerPath AI. All Rights Reserved.
</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const message =
    document.getElementById("loginMessage");

    message.innerHTML =
    '<div class="alert alert-info">Logging in...</div>';

    try{

        const response = await fetch(

        "https://careerpath-ai-opgp.onrender.com/login",

        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:email,

                password:password

            })

        });

        const data = await response.json();

        if(data.success){

            message.innerHTML =

            '<div class="alert alert-success">Login Successful. Redirecting...</div>';

            localStorage.setItem("user", JSON.stringify(data.user));

            setTimeout(function(){

                window.location.href="index.html";

            },1000);

        }

        else{

            message.innerHTML =

            `<div class="alert alert-danger">

            ${data.message}

            </div>`;

        }

    }

    catch(error){

        message.innerHTML =

        `<div class="alert alert-danger">

        Unable to connect to backend.<br>

        Make sure Flask is running on
        https://careerpath-ai-opgp.onrender.com
        </div>`;

    }

});

</script>

</body>
</html>
